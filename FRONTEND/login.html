<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SecureBank — Login</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" />
  <style>
    body { background: #f0f4f8; }
    .login-card { max-width: 420px; margin: 100px auto; }
    .brand { font-size: 1.6rem; font-weight: 700; color: #1a56db; }
  </style>
</head>
<body>
  <div class="login-card card shadow-sm p-4">
    <div class="text-center mb-4">
      <div class="brand">🏦 SecureBank</div>
      <p class="text-muted mt-1">Sign in to your account</p>
    </div>

    <div id="error-msg" class="alert alert-danger d-none"></div>

    <form id="login-form">
      <div class="mb-3">
        <label for="username" class="form-label">Username</label>
        <input type="text" class="form-control" id="username" placeholder="Enter username" required />
      </div>
      <div class="mb-3">
        <label for="password" class="form-label">Password</label>
        <input type="password" class="form-control" id="password" placeholder="Enter password" required />
      </div>
      <button type="submit" class="btn btn-primary w-100">Login</button>
    </form>

    <p class="text-muted text-center mt-3" style="font-size:0.8rem;">
      Demo accounts: alice / alice123 &nbsp;|&nbsp; bob / bob123 &nbsp;|&nbsp; carol / carol123
    </p>
  </div>

  <script>
    document.getElementById("login-form").addEventListener("submit", async function (e) {
      e.preventDefault();
      const username = document.getElementById("username").value.trim();
      const password = document.getElementById("password").value.trim();
      const errorDiv = document.getElementById("error-msg");
      errorDiv.classList.add("d-none");

      try {
        const res = await fetch("http://127.0.0.1:5000/api/auth/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          credentials: "include",
          body: JSON.stringify({ username, password }),
        });
        const data = await res.json();
        if (res.ok) {
          window.location.href = "dashboard.html";
        } else {
          errorDiv.textContent = data.error || "Login failed";
          errorDiv.classList.remove("d-none");
        }
      } catch (err) {
        errorDiv.textContent = "Cannot connect to server. Is Flask running?";
        errorDiv.classList.remove("d-none");
      }
    });
  </script>
</body>
</html>
